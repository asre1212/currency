<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a4d68"/>
      <stop offset="50%" stop-color="#088395"/>
      <stop offset="100%" stop-color="#05BFDB"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FFC107"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle highlight -->
  <ellipse cx="256" cy="120" rx="280" ry="120" fill="white" opacity="0.08"/>

  <!-- Airplane silhouette -->
  <g transform="translate(256 200) rotate(-25)" filter="url(#shadow)">
    <path d="M -120 0 L -40 -22 L 60 -28 L 110 -50 L 132 -42 L 100 -8 L 130 6 L 116 22 L 76 12 L 50 38 L 56 56 L 40 60 L 18 36 L -18 30 L -36 50 L -52 50 L -50 26 L -76 18 L -120 0 Z"
          fill="#ffffff" opacity="0.96"/>
  </g>

  <!-- Dollar sign in gold badge -->
  <g transform="translate(256 360)" filter="url(#shadow)">
    <text x="0" y="42" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif"
          font-size="170" font-weight="800" fill="url(#gold)">$</text>
  </g>
</svg>
